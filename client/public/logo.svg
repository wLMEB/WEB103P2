<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Building base -->
  <rect x="10" y="45" width="80" height="45" rx="2" fill="#1a5276"/>
  <!-- Columns -->
  <rect x="18" y="48" width="10" height="42" rx="1" fill="#2e86c1"/>
  <rect x="34" y="48" width="10" height="42" rx="1" fill="#2e86c1"/>
  <rect x="56" y="48" width="10" height="42" rx="1" fill="#2e86c1"/>
  <rect x="72" y="48" width="10" height="42" rx="1" fill="#2e86c1"/>
  <!-- Pediment / Roof -->
  <polygon points="5,45 50,10 95,45" fill="#f39c12"/>
  <!-- Door -->
  <rect x="40" y="68" width="20" height="22" rx="10" fill="#f39c12"/>
  <!-- Book on top -->
  <rect x="35" y="20" width="30" height="8" rx="2" fill="white" opacity="0.9"/>
  <line x1="50" y1="20" x2="50" y2="28" stroke="#1a5276" stroke-width="1.5"/>
</svg>
